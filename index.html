<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무보고</title>

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
}

body {
  font-family: Arial, sans-serif;
  background: #f5f6fa;
  color: #111;
}

.container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  width: 100%;
  max-width: 480px;
  background: white;
  border-radius: 16px;
  padding: 24px 18px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

h1 {
  margin: 0 0 24px 0;
  text-align: center;
  font-size: 26px;
}

.button-row {
  display: flex;
  gap: 12px;
}

.menu-btn {
  flex: 1;
  display: inline-block;
  text-align: center;
  text-decoration: none;
  background: black;
  color: white;
  padding: 18px 10px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
}

.menu-btn:active {
  opacity: 0.85;
}

.note {
  margin-top: 24px;
  text-align: center;
  font-size: 14px;
  color: #555;
  line-height: 1.5;
}
</style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>S점 출근/퇴근 보고</h1>

      <div class="button-row">
        <a class="menu-btn" href="start.html">출근보고</a>
        <a class="menu-btn" href="finish.html">퇴근보고</a>
      </div>

      <div class="note">
        버튼을 눌러 보고를 진행해주세요.
      </div>
    </div>
  </div>
</body>
</html>
